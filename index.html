<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kansas Tattoo Supply</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111; /* dark tattoo shop vibe */
        font-family: 'Arial', sans-serif;
        color: #f2f2f2;
        text-align: center;
    }

    .container {
        max-width: 650px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    img {
        width: 100%;
        height: auto;
        border-radius: 6px;
        box-shadow: 0 0 25px rgba(0,0,0,0.6); /* gritty shadow */
    }

    .banner {
        margin-top: 25px;
        font-size: 22px;
        font-weight: bold;
        color: #e63946; /* red accent common in tattoo branding */
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .button {
        display: inline-block;
        margin-top: 30px;
        padding: 16px 34px;
        background: #e63946; /* bold red button */
        color: #fff;
        text-decoration: none;
        font-size: 20px;
        font-weight: bold;
        border-radius: 6px;
        transition: 0.2s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .button:hover {
        background: #b82c38;
        transform: scale(1.05);
    }
</style>
</head>

<body>
<div class="container">

    <img src="https://cdn.shopify.com/s/files/1/0278/5814/1318/files/Kansas_Landing_Page.jpg?v=1783028393" alt="Kansas Tattoo Supply">

    <div class="banner">
        Use code "Kansas" for 10% off your first order!
    </div>

    <a class="button" href="https://solidstatetattoosupply.com">
        Shop Now
    </a>

</div>
</body>
</html>
